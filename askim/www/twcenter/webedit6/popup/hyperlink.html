<!DOCTYPE html>
<html lang="ko">
  <head>
    <title>Hyperlink</title>
    <meta name="robots" content="noindex, nofollow">
    <meta http-equiv="content-type" content="text/html; charset=utf-8">
    <link rel="stylesheet" type="text/css" href="../css/dialog.css">
  </head>
  <body>
    <div class="app" style="width:320px !important;">
      <main class="app-main">
        <div class="wrapper">
          <div class="page">
            <div class="page-inner">
              <div class="page-section">
                <form>
                  <div class="row no-gutters">
                    <div class="col-4">
                      <label for="fm_protocol" class="d-none">프로토콜</label>
                      <select name="protocol" id="fm_protocol" class="custom-select custom-select-sm">
                      <option value="http:">http</option>
                      <option value="https:" selected>https</option>
                      <option value="mailto:">mailto</option>
                      </select>
                    </div>
                    <div class="col-8 pl-1">
                      <label for="fm_link_value" class="d-none">URL</label>
                      <input type="text" name="link_value" id="fm_link_value" class="form-control form-control-sm" placeholder="URL 입력" spellcheck="false" autocomplete="off">
                    </div>
                  </div>
                  <div class="row no-gutters mt-1">
                    <div class="col-4 d-flex align-items-center justify-content-center">
                      <label for="fm_link_title" class="m-0">타이틀</label>
                    </div>
                    <div class="col-8 pl-1">
                      <input type="text" name="link_title" id="fm_link_title" class="form-control form-control-sm" placeholder="옵션" spellcheck="false" autocomplete="off">
                    </div>
                  </div>
                  <hr class="break-hr">
                  <div class="input-group justify-content-end">
                    <input type="button" class="cheditor-btn btn-light mr-1" id="btn_cancel" value="취소">
                    <input type="submit" class="cheditor-btn btn-primary" value="확인">
                  </div>
                </form>
              </div>
            </div>
          </div>
        </div>
      </main>
    </div>
    <script type="module" src="./js/hyperlink.js"></script>
  </body>
</html>
