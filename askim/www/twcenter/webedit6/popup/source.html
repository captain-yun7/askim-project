<!DOCTYPE html>
<html lang="ko">
	<head>
		<title>소스 편집</title>
		<meta name="robots" content="noindex, nofollow">
		<meta http-equiv="content-type" content="text/html; charset=utf-8">
		<link rel="stylesheet" type="text/css" href="../css/dialog.css">
		<link rel="stylesheet" type="text/css" href="../css/source.css">
	</head>
	<body>
		<div class="app" style="width: 800px !important;">
			<main class="app-main">
				<div class="wrapper">
					<div class="page">
						<div class="page-inner">
							<div class="page-section">
								<div class="row no-gutters mb-1">
									<div class="col-10 input-group align-content-center justify-content-start">
										<button class="cheditor-btn btn-light btn-xs mr-3 fold-open" id="btn_fold"></button>
										<button class="cheditor-btn btn-secondary btn-xs mr-1" id="btn_undo"></button>
										<button class="cheditor-btn btn-secondary btn-xs mr-1" id="btn_redo"></button>
										<button class="cheditor-btn btn-secondary btn-xs mr-1" id="btn_search"></button>
										<button type="button" class="cheditor-btn btn-secondary btn-xs mr-1" id="btn_update_preview" disabled><span>&nbsp</span>미리보기</button>
										<button class="cheditor-btn btn-secondary btn-xs" id="btn_revert" disabled><span>&nbsp;</span>되돌리기</button>
									</div>
									<div class="col-2 pr-3 input-group justify-content-end">
										<div class="custom-control custom-checkbox ml-1">
											<input type="checkbox" class="custom-control-input" id="fm_text_wrap" name="text-wrap" checked="checked">
											<label class="custom-control-label" for="fm_text_wrap"><span class="text-wrap-icon">&nbsp;</span></label>
										</div>
									</div>
								</div>
								<div class="code-container">
									<label for="code-textarea" class="d-none"></label>
									<textarea id="code-textarea" class="d-none"></textarea>
								</div>
								<div class="row my-1">
									<div class="col-9 input-group align-content-center justify-content-start">
										<span class="text-muted font-sm">(Tab: 들여쓰기/자동완성, Shift+Tab: 내어쓰기, Ctrl/Cmd+/: 주석토글)</span>
									</div>
								</div>
								<div class="code-preview-wrapper mb-2">
									<iframe id="code-preview"></iframe>
								</div>
								<div class="input-group justify-content-center">
									<button class="cheditor-btn btn-light mr-1" style="width: 100px" id="btn_cancel">취소</button>
									<button class="cheditor-btn btn-primary" style="width: 100px" id="btn_submit">적용</button>
								</div>
							</div>
						</div>
					</div>
				</div>
			</main>
		</div>
		<script type="module" src="./js/source.min.js"></script>
	</body>
</html>
